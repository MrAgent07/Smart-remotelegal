<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beam Remote</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 520px;
      margin: 3rem auto;
      padding: 0 1.25rem;
      text-align: center;
      line-height: 1.5;
      color: #111;
      background: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #f5f5f5; background: #0d0d12; }
      a { color: #6eb6ff; }
      .card { background: #17171f; border-color: #2a2a35; }
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p { color: #555; }
    @media (prefers-color-scheme: dark) { p { color: #aaa; } }
    .card {
      margin-top: 2rem;
      padding: 1.25rem;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      background: #fff;
      text-align: left;
    }
    a {
      display: block;
      margin: 0.75rem 0;
      color: #007aff;
      font-size: 1.05rem;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover { text-decoration: underline; }
    small { display: block; margin-top: 2rem; color: #888; }
  </style>
</head>
<body>
  <h1>Beam Remote</h1>
  <p>Premium universal TV remote for your home Wi‑Fi network.</p>

  <div class="card">
    <a href="privacy.html">Privacy Policy</a>
    <a href="support.html">Support</a>
    <a href="mailto:beamremote.support@gmail.com">beamremote.support@gmail.com</a>
  </div>

  <small>Bundle ID: com.beamremote.app · iOS 17+</small>
</body>
</html>
